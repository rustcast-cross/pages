name: Compile single branch
description: Compiles pages for a single branch out of dev or master
on:
  workflow_call:
    inputs:
      dev:
        description: "Whether this is for the dev branch or not"
        type: boolean
        required: true
    outputs:
      rustdoc_artifact_id:
        description: "The ID for the artifact containing the compiled rustdoc"
        value: ${{ jobs.rustdoc.outputs.artifact_id }}
      mdbook_artifact_id:
        description: "The ID for the artifact containing the compiled mdbook"
        value: ${{ jobs.mdbook.outputs.artifact_id }}

jobs:
  asset_handle:
    name: Copy assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      - name: Copy assets
        run: |
          cp ./rustcast-cross/assets/icon/icon_opt.svg site/assets/
          cp ./rustcast-cross/assets/icon/icon64.png site/assets/

  mdbook:
    outputs:
      artifact_id: ${{ steps.upload.outputs.artifact-id }}
    permissions:
      contents: write  # To push a branch
      id-token: write # To update the deployment status
    runs-on: ubuntu-latest
    needs: ["asset_handle"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'true'
      - name: Install latest mdbook
        run: |
          tag=$(curl 'https://api.github.com/repos/rust-lang/mdbook/releases/latest' | jq -r '.tag_name')
          url="https://github.com/rust-lang/mdbook/releases/download/${tag}/mdbook-${tag}-x86_64-unknown-linux-gnu.tar.gz"
          mkdir mdbook
          curl -sSL $url | tar -xz --directory=./mdbook
          echo `pwd`/mdbook >> $GITHUB_PATH
      - name: Build MDBook
        run: |
          cd rustcast-cross/book
          title="${{ inputs.dev && 'Rustcast-cross docs [DEV]' || 'Rustcast-cross docs' }}"
          MDBOOK_html__site_url="/book/" MDBOOK_book__title="Rustcast-cross docs [DEV]" mdbook build --dest-dir ../../site/book
      - name: Upload artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          path: site/book
  rustdoc:
    outputs:
      artifact_id: ${{ steps.upload.outputs.artifact-id }}
    permissions:
      contents: write  # To push a branch
      id-token: write # To update the deployment status
    runs-on: windows-latest # linux needs system deps which i cba to add a step to add
    needs: ["asset_handle"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: 'true'
      - name: Set up Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Run rustdoc
        run: |
          cd rustcast-cross
          cargo doc --no-deps --target-dir ../site
      - name: Upload artifacts
        id: upload
        uses: actions/upload-artifact@v4
        with:
          path: site/doc/rustcast