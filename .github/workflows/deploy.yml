name: "Deploy pages"

permissions:
  contents: write
  id-token: write
  pages: write
on:
  workflow_dispatch:

    inputs:
      dev:
        type: boolean
        default: true
      master:
        type: boolean
        default: false # Since it's still broken

jobs:
  dev:
    if: ${{ inputs.dev }}
    uses: ./.github/workflows/deploy_branch.yml
    with:
      dev: true
    permissions:
      contents: write
      id-token: write

  master:
    if: ${{ inputs.master }}
    uses: ./.github/workflows/deploy_branch.yml
    with:
      dev: false
    permissions:
      contents: write
      id-token: write

  deploy:
    runs-on: ubuntu-latest
    needs: [dev, master]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download dev artifact
        if: ${{ inputs.dev }}
        uses: actions/download-artifact@v5
        with:
          artifact-ids: ${{ needs.dev.outputs.artifact_id }}
          path: site/dev
      - name: Download master artifact
        if: ${{ inputs.master }}
        uses: actions/download-artifact@v5
        with:
          artifact-ids: ${{ needs.dev.outputs.artifact_id }}
          path: site/
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4