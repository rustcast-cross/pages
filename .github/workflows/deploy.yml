name: "Deploy pages"

on:
  workflow_dispatch:
    inputs:
      dev:
        type: boolean
        default: true
      master:
        type: boolean
        default: false # Since it's still broken

jobs:
  dev:
    if: ${{ inputs.dev }}
    runs-on: ubuntu-latest
    outputs:
        artifact_id: ${{ steps.compile.outputs.artifact_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compile
        id: compile
        uses: ./.github/workflows/deploy_branch.yml
        with:
          dev: true

  master:
    if: ${{ inputs.master }}
    runs-on: ubuntu-latest
    outputs:
        artifact_id: ${{ steps.compile.outputs.artifact_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Compile
        id: compile
        uses: ./.github/workflows/deploy_branch.yml
        with:
            dev: false

  deploy:
    runs-on: ubuntu-latest
    needs: [dev, master]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download dev artifact
        if: ${{ inputs.dev }}
        uses: actions/download-artifact@v5
        with:
          artifact-ids: ${{ needs.dev.outputs.artifact_id }}
          path: site/dev
      - name: Download master artifact
        if: ${{ inputs.master }}
        uses: actions/download-artifact@v5
        with:
          artifact-ids: ${{ needs.dev.outputs.artifact_id }}
          path: site/
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4